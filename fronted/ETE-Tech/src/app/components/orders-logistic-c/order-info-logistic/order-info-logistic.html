<div class="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-slate-200 w-full">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 w-full">
    
    <div class="flex flex-col w-full">
      <h3 class="text-[10px] font-bold uppercase tracking-[0.1em] text-slate-400 mb-4">Identidad del Cliente</h3>
      <div class="flex items-start gap-4">
        <div class="w-12 h-12 rounded bg-blue-50 flex items-center justify-center shrink-0">
          <span class="material-symbols-outlined text-blue-900">corporate_fare</span>
        </div>
        <div>
          <p class="text-lg md:text-xl font-bold text-slate-900">{{ clientName || 'Cargando cliente...' }}</p>
        </div>
      </div>
    </div>

    <div class="flex flex-col w-full">
      <h3 class="text-[10px] font-bold uppercase tracking-[0.1em] text-slate-400 mb-4">Perfil del Equipo</h3>
      <div class="space-y-3">
        <div class="flex justify-between items-center border-b border-slate-100 pb-2">
          <span class="text-xs font-medium text-slate-500 uppercase">Marca / Modelo</span>
          <span class="text-sm font-bold text-slate-900">{{ brandModel }}</span>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-xs font-medium text-slate-500 uppercase">Falla Reportada</span>
          <p class="text-sm text-slate-700 leading-relaxed">{{ reportedFault }}</p>
        </div>
      </div>
    </div>

  </div>
</div>
