<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
  <div class="bg-surface w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-outline-variant">
    
    <div class="px-6 py-4 border-b border-outline-variant flex justify-between items-center bg-surface">
      <h3 class="text-xl font-headline font-bold text-on-surface">Agregar Refacción</h3>
      <button (click)="onClose()" class="text-outline hover:text-on-surface transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="p-6">
      
      <div *ngIf="isLoadingProducts" class="flex flex-col items-center justify-center py-10">
        <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-on-surface-variant font-medium">Cargando inventario...</p>
      </div>

      <div *ngIf="!isLoadingProducts">
        <div class="space-y-4">
          
          <div>
            <label class="block text-sm font-label font-medium text-on-surface-variant mb-1.5">Producto / Refacción</label>
            <select [(ngModel)]="selectedProductId" 
                    class="w-full p-2.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:ring-2 focus:ring-primary/20 outline-none transition-all">
              <option [ngValue]="null" disabled>Selecciona una pieza...</option>
              <option *ngFor="let p of products" [value]="p.Product_ID">
                {{ p.Name }} - ${{ p.Final_Price }} (Stock: {{ p.Current_Stock }})
              </option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-label font-medium text-on-surface-variant mb-1.5">Cantidad</label>
            <input type="number" [(ngModel)]="selectedQuantity" min="1"
                   class="w-full p-2.5 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface outline-none focus:border-primary transition-all"/>
          </div>

        </div>

        <div class="flex justify-end gap-3 mt-8">
          <button (click)="onClose()" 
                  class="px-5 py-2.5 text-sm font-label font-bold text-primary hover:bg-primary/5 rounded-lg transition-colors">
            Cancelar
          </button>
          
          <button (click)="saveProduct()" 
                  [disabled]="isSaving || !selectedProductId"
                  class="px-6 py-2.5 text-sm font-label font-bold bg-primary text-on-primary rounded-lg shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2">
            <span *ngIf="isSaving" class="w-4 h-4 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></span>
            {{ isSaving ? 'Guardando...' : 'Agregar a la Orden' }}
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
