<section class="carrito">
    <h2>Carrito</h2>
    @if(carrito().length === 0){
        <p>El carrito esta vacio</p>
    } @else {
        <ul>
            @for (producto of carrito(); track producto.Product_ID){
                <li class="producto">
                    <p>{{producto.Name}}</p>
                    <p>{{producto.Final_Price | currency}}</p>
                    <button class="btn btn-danger" (click)="eliminar(producto)">Eliminar</button>
                </li>
            }
        </ul>
        <p>Total: {{total() | currency}}</p>
        <button class="btn btn-danger" (click)="vaciar()">Vaciar</button>
        <button class="btn btn-primary" (click)="exportarXML()">Generar Tiquet</button>
    }
</section>
