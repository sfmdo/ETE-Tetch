<div *ngIf="loading" class="flex justify-center items-center h-64">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
</div>

<div *ngIf="!loading && order" 
  class="grid grid-cols-1 lg:grid-cols-12 gap-6 p-4 md:p-8 max-w-7xl mx-auto w-full">
  
  <div class="col-span-1 lg:col-span-8 flex flex-col gap-6">
    
    <app-order-info-logistic 
      [clientName]="order.Client_Name"
      [clientId]="order.Client_ID"
      [brandModel]="order.Brand_Model"
      [reportedFault]="order.Reported_Fault">
    </app-order-info-logistic>

    <app-logistic-status 
      [currentStatus]="order.Logistics_Status"
      (statusChanged)="onStatusChange($event)">
    </app-logistic-status>

    <app-parts-assignment 
      [orderId]="order.Order_ID" 
      [items]="order.Items || []" 
      (partsUpdated)="loadOrder(order.Order_ID)"
      [logisticStatus]="order.Logistics_Status">
    </app-parts-assignment>

    <app-technical-record 
      [initialDiagnosis]="order.Final_Diagnosis || ''"
      [initialSolution]="order.Applied_Solution || ''"
      [technicianId]="loggedUserId"
      (saveDiagnosis)="onSaveDiagnosis($event)">
    </app-technical-record>
  </div>

  <div class="col-span-1 lg:col-span-4 flex flex-col gap-6">
    
    <div class="lg:sticky lg:top-24 flex flex-col gap-6">
      <app-financial-summary 
        [order]="order">
      </app-financial-summary>

      <app-order-assignment 
        [currentTechnician]="order.Technician_ID"
        [currentTechnicianName]="order.Technician_Name"
        (assignToMe)="onAssignToMe()">
      </app-order-assignment>
    </div>

  </div>

</div>
