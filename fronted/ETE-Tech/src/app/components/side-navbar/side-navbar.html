<aside class="hidden md:flex h-screen w-64 flex-col py-8 px-4 space-y-2 bg-slate-50 dark:bg-slate-950 border-r border-slate-200/20 dark:border-slate-800/20 font-manrope text-sm antialiased shrink-0">
  
  <div class="px-2 mb-6">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 rounded bg-primary flex items-center justify-center text-on-primary">
        <span class="material-symbols-outlined" data-icon="precision_manufacturing">precision_manufacturing</span>
      </div>
      <div>
        <h2 class="font-bold text-lg text-blue-950 dark:text-white leading-tight">ETE-Tech Admin</h2>
        <p class="text-xs text-slate-500">Precision Management</p>
      </div>
    </div>
  </div>

  <button class="w-full py-2.5 px-4 mb-6 bg-primary text-on-primary rounded-md font-semibold text-sm shadow-sm hover:translate-x-1 transition-transform duration-200 active:opacity-80 flex items-center justify-center gap-2">
    <span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
    New Repair Ticket
  </button>

  <nav class="flex-1 space-y-1">
    <a routerLink="/dashboard" routerLinkActive="bg-blue-50 dark:bg-blue-900/20 text-blue-900 dark:text-blue-400 font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md hover:translate-x-1 transition-transform duration-200 cursor-pointer active:opacity-80">
      <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
      Overview
    </a>
    
    <a routerLink="/repairs" routerLinkActive="bg-blue-50 dark:bg-blue-900/20 text-blue-900 dark:text-blue-400 font-semibold" class="flex items-center gap-3 px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md hover:translate-x-1 transition-transform duration-200 cursor-pointer active:opacity-80">
      <span class="material-symbols-outlined" data-icon="build">build</span>
      Repairs
    </a>
    
    <a routerLink="/inventory" routerLinkActive="bg-blue-50 dark:bg-blue-900/20 text-blue-900 dark:text-blue-400 font-semibold" class="flex items-center gap-3 px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md hover:translate-x-1 transition-transform duration-200 cursor-pointer active:opacity-80">
      <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
      Inventory
    </a>
    
    <a routerLink="/staff" routerLinkActive="bg-blue-50 dark:bg-blue-900/20 text-blue-900 dark:text-blue-400 font-semibold" class="flex items-center gap-3 px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md hover:translate-x-1 transition-transform duration-200 cursor-pointer active:opacity-80">
      <span class="material-symbols-outlined" data-icon="badge">badge</span>
      Staff
    </a>
    
    <a routerLink="/settings" routerLinkActive="bg-blue-50 dark:bg-blue-900/20 text-blue-900 dark:text-blue-400 font-semibold" class="flex items-center gap-3 px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md hover:translate-x-1 transition-transform duration-200 cursor-pointer active:opacity-80">
      <span class="material-symbols-outlined" data-icon="settings">settings</span>
      Settings
    </a>
  </nav>

  <div class="pt-4 mt-4 border-t border-slate-200/50 space-y-1">
    <a routerLink="/support" class="flex items-center gap-3 px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md hover:translate-x-1 transition-transform duration-200 cursor-pointer active:opacity-80">
      <span class="material-symbols-outlined" data-icon="help">help</span>
      Support
    </a>
    
    <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md hover:translate-x-1 transition-transform duration-200 cursor-pointer active:opacity-80">
      <span class="material-symbols-outlined" data-icon="logout">logout</span>
      Logout
    </button>
  </div>
</aside>
