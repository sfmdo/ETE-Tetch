<div class="flex-1 overflow-y-auto pt-16 md:pt-0 pb-8 px-4 md:px-12 bg-surface h-full">
  <div class="max-w-7xl mx-auto mt-8 flex flex-col gap-8">
    <header>
      <h1 class="font-headline text-4xl font-bold tracking-tight text-primary mb-2">Catálogo de Productos</h1>
      <p class="text-on-surface-variant text-lg">Explora y adquiere nuestros servicios de hardware y software.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (product of products; track product.Product_ID) {
        <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-200/50 hover:shadow-md transition-shadow flex flex-col">
          <div class="h-48 overflow-hidden bg-slate-100 relative">
            <img class="w-full h-full object-cover" [src]="product.Image" [alt]="product.Name">
          </div>
          <div class="p-6 flex flex-col flex-grow">
            <h3 class="font-headline text-xl font-bold text-primary mb-2">{{product.Name}}</h3>
            <p class="text-sm text-on-surface-variant mb-4 flex-grow">{{product.Description}}</p>
            <div class="flex items-center justify-between mt-auto">
              <span class="font-headline font-bold text-xl text-primary">${{product.Final_Price}}</span>
              <button class="bg-primary text-on-primary px-4 py-2 rounded-md text-sm font-medium hover:opacity-90 transition-opacity" (click)="agregarAlCarrito(product)">
                Agregar al Carrito
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
