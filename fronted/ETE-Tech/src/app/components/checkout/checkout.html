<div class="flex flex-col h-full animate-fade-in">
  
  <div class="p-6 bg-blue-600 text-white border-b border-blue-700">
    <h2 class="font-headline text-lg font-bold flex items-center gap-2">
      <span class="material-symbols-outlined">account_balance_wallet</span>
      Finalizar Pago
    </h2>
    <p class="text-xs text-blue-100 mt-1">Total a pagar por anticipo</p>
  </div>

  <div class="p-6 space-y-4">
    <div class="space-y-1">
      <p class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Servicio</p>
      <p class="text-sm font-medium text-slate-800">{{ product?.Name }}</p>
    </div>
    
    <div class="space-y-1">
      <p class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Equipo</p>
      <p class="text-sm font-medium text-slate-800">{{ formValues?.brand }} {{ formValues?.model }}</p>
    </div>

    <div class="flex justify-between items-center pt-4 border-t border-slate-200">
      <span class="text-sm font-medium text-slate-600">Total</span>
      <span class="text-xl font-bold text-primary">${{ product?.Final_Price| number:'1.2-2' }}</span>
    </div>
  </div>

  <div class="p-6 bg-slate-50 border-t border-slate-100 flex-1 flex flex-col items-center">
    
    <div *ngIf="mensajeStatus" 
         class="w-full mb-4 p-3 rounded-lg text-sm font-medium text-center shadow-sm"
         [ngClass]="{
           'bg-blue-100 text-blue-800 border border-blue-200': cargando,
           'bg-red-100 text-red-800 border border-red-200': mensajeStatus.includes('Error') || mensajeStatus.includes('Aviso')
         }">
      {{ mensajeStatus }}
    </div>

    <div class="w-full relative z-0" [hidden]="cargando" #paypalButtonContainer></div>

    <div *ngIf="cargando" class="flex flex-col items-center justify-center py-6 gap-3">
      <span class="material-symbols-outlined animate-spin text-blue-600 text-4xl">autorenew</span>
      <p class="text-sm text-slate-500 font-medium">Por favor, espera...</p>
    </div>

    <button *ngIf="!cargando" (click)="volverAtras.emit()" class="mt-4 text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:text-slate-600 transition-colors">
      ← Volver al formulario
    </button>
  </div>
</div>
